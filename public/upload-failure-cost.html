<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실패비용 자동 가공</title>
<style>
:root{--primary:#1a1a2e;--accent:#e74c3c;--accent2:#2980b9;--bg:#f8f9fa;--card:#fff;--border:#e0e0e0;--text:#333;--text2:#666;--success:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:20px}
header{background:var(--primary);color:#fff;padding:16px 0;margin-bottom:24px}
header .container{display:flex;align-items:center;gap:16px}
header h1{font-size:20px;font-weight:600}
header a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px}
.badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.steps{display:flex;gap:4px;margin-bottom:24px}
.steps div{flex:1;height:4px;background:var(--border);border-radius:2px;transition:background .3s}
.steps div.active{background:var(--accent2)}.steps div.done{background:var(--success)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{font-size:18px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card h2 .n{background:var(--accent2);color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.card .desc{color:var(--text2);font-size:13px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.slot{border:2px dashed var(--border);border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.slot:hover{border-color:var(--accent2);background:#f0f7ff}
.slot.over{border-color:var(--accent2);background:#e3f2fd;transform:scale(1.02)}
.slot.done{border-color:var(--success);border-style:solid;background:#f0faf4}
.slot .ico{font-size:28px;margin-bottom:4px}.slot .name{font-size:14px;font-weight:600}
.slot .sub{font-size:11px;color:var(--text2);margin-top:2px}
.slot .st{font-size:12px;margin-top:8px;font-weight:600;min-height:18px}
.st.ok{color:var(--success)}.st.err{color:var(--accent)}.st.ld{color:var(--accent2)}
.ym{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:#fff8e1;border-radius:8px;border:1px solid #ffe082}
.ym label{font-size:13px;font-weight:600;white-space:nowrap}
.ym input{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;width:140px}
.rev{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:#e3f2fd;border-radius:8px;border:1px solid #90caf9}
.rev label{font-size:13px;font-weight:600;white-space:nowrap}
.rev input{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;width:200px;text-align:right}
.rev span{font-size:12px;color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p{background:var(--accent2);color:#fff}.btn-p:hover{background:#2471a3}.btn-p:disabled{background:#bbb;cursor:not-allowed}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{background:#219a52}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-o:hover{background:#f5f5f5}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.total-card{background:linear-gradient(135deg,#1a1a2e,#2c3e6b);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.total-card .lb{font-size:13px;opacity:.7}.total-card .vl{font-size:32px;font-weight:800;font-family:'SF Mono',monospace;margin-top:4px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.si{background:#f8f9fa;border-radius:8px;padding:12px;border-left:4px solid var(--accent)}
.si .lb{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.si .vl{font-size:16px;font-weight:700;margin-top:2px;font-family:'SF Mono',monospace}
table.rt{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
table.rt th{background:var(--primary);color:#fff;padding:8px 12px;text-align:left;font-weight:500}
table.rt td{padding:8px 12px;border-bottom:1px solid var(--border)}
table.rt .num{text-align:right;font-family:'SF Mono',monospace}
.tag{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-p{background:#e8f5e9;color:#2e7d32}.tag-e{background:#fff8e1;color:#f57f17}.tag-f{background:#fce4ec;color:#c62828}
.log{background:#1a1a2e;color:#a0e0a0;border-radius:8px;padding:16px;font-family:'SF Mono',monospace;font-size:12px;max-height:200px;overflow-y:auto;margin-top:12px;white-space:pre-wrap}
.hid{display:none!important}
</style>
</head>
<body>
<header><div class="container">
<a href="index.html">← 포털로 돌아가기</a>
<h1>실패비용 자동 가공</h1>
<span class="badge">NEW</span>
</div></header>
<div class="container">
<div class="steps"><div class="active" id="s1"></div><div id="s2"></div><div id="s3"></div></div>
<div id="libMsg" style="text-align:center;padding:40px;color:var(--text2)">⏳ 라이브러리 로딩 중...</div>

<!-- STEP 1 -->
<div class="card hid" id="step1">
<h2><span class="n">1</span> 로우데이터 업로드</h2>
<p class="desc">5개 파일을 각 칸에 <b>클릭</b>하거나 <b>드래그</b>하여 올려주세요.</p>
<div class="ym"><label>📅 대상 연월:</label><input type="month" id="ymIn" value="2026-02"></div>
<div class="rev"><label>💰 매출액 (원):</label><input type="text" id="revIn" placeholder="예: 9,610,981,883"><span>KPI 비율 계산용</span></div>
<div class="grid" id="fileGrid"></div>
<div class="actions">
<button class="btn btn-p" id="btnGo" disabled>🔄 자동 가공 시작</button>
<button class="btn btn-o" id="btnReset">초기화</button>
</div>
</div>

<!-- STEP 2 -->
<div class="card hid" id="step2">
<h2><span class="n">2</span> 가공 결과 확인</h2>
<p class="desc">로우데이터에서 자동 추출된 품질비용 항목입니다.</p>
<div id="totalCard"></div>
<h3 style="font-size:14px;font-weight:600;margin-bottom:8px">📤 포털 업로드 항목</h3>
<div class="sg" id="sumG"></div>
<h3 style="margin-top:16px;font-size:14px;font-weight:600">📋 상세 내역</h3>
<div style="overflow-x:auto"><table class="rt" id="tbl"><thead><tr><th>#</th><th>구분</th><th>해당항목</th><th>적요</th><th style="text-align:right">금액(원)</th></tr></thead><tbody></tbody></table></div>
<div class="actions">
<button class="btn btn-s" id="btnUp">✅ Supabase에 업로드</button>
<button class="btn btn-o" id="btnXl">📥 엑셀 다운로드</button>
<button class="btn btn-o" id="btnCsv">📥 CSV 다운로드</button>
<button class="btn btn-o" id="btnBack">← 다시 업로드</button>
</div>
</div>

<!-- STEP 3 -->
<div class="card hid" id="step3">
<h2><span class="n">3</span> 업로드 완료</h2>
<div id="upRes"></div>
<div class="log" id="upLog"></div>
<div class="actions" style="margin-top:16px">
<a href="index.html#kpi" class="btn btn-p">📊 KPI 현황에서 확인</a>
<button class="btn btn-o" onclick="location.reload()">새 데이터 업로드</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js"></script>
<script>
(function(){
var SB_URL='https://cyxnbwczcvjeaqmrdzcb.supabase.co',SB_KEY='sb_publishable_i2Cw7SPjRn1BDa5XS-2NyA_qHNRC8Y5';
var F={},R={},SLOTS=[
  {k:'je',i:'📊',n:'(제)비용 분개장',s:"코스트센터 '품질관리팀(평택)' 필터"},
  {k:'haja',i:'📋',n:'하자보수비 분개장',s:"소파사업부 제외, 적요 '하자보수비' 제외"},
  {k:'brand',i:'🏢',n:'브랜드 용역료 청구 현황',s:'② 시디즈: 상담AS+모바일+접수AS'},
  {k:'as',i:'🔧',n:'AS 조치 용역료 청구',s:'(전표) 시트 → 시디즈 합계'},
  {k:'logi',i:'🚛',n:'시디즈 용역료 청구서',s:'AS조치 → 물류 시디즈 용역료'}
];

window.addEventListener('load',function(){
  setTimeout(function(){
    if(typeof XLSX==='undefined'){
      document.getElementById('libMsg').innerHTML='❌ 라이브러리 로드 실패.<br>인터넷 연결 확인 후 새로고침하세요.';return;}
    document.getElementById('libMsg').classList.add('hid');
    document.getElementById('step1').classList.remove('hid');
    buildUI();
  },300);
});

function buildUI(){
  var g=document.getElementById('fileGrid');g.innerHTML='';
  SLOTS.forEach(function(s){
    F[s.k]=null;
    var d=document.createElement('div');d.className='slot';d.id='sl-'+s.k;
    d.innerHTML='<div class="ico">'+s.i+'</div><div class="name">'+s.n+'</div><div class="sub">'+s.s+'</div><div class="st" id="st-'+s.k+'">클릭 또는 드래그</div>';
    var inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';inp.style.cssText='position:absolute;left:-9999px';
    document.body.appendChild(inp);
    d.addEventListener('click',function(e){e.preventDefault();inp.value='';inp.click()});
    inp.addEventListener('change',function(){if(this.files[0])loadFile(this.files[0],s.k)});
    d.addEventListener('dragover',function(e){e.preventDefault();d.classList.add('over')});
    d.addEventListener('dragleave',function(e){e.preventDefault();d.classList.remove('over')});
    d.addEventListener('drop',function(e){e.preventDefault();d.classList.remove('over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0],s.k)});
    g.appendChild(d);
  });
  document.getElementById('btnGo').addEventListener('click',process);
  document.getElementById('btnReset').addEventListener('click',resetAll);
  document.getElementById('btnUp').addEventListener('click',upload);
  document.getElementById('btnXl').addEventListener('click',dlXl);
  document.getElementById('btnCsv').addEventListener('click',dlCsv);
  document.getElementById('btnBack').addEventListener('click',goBack);
  document.getElementById('revIn').addEventListener('input',function(){var v=this.value.replace(/\D/g,'');this.value=v?Number(v).toLocaleString():''});
}

function loadFile(file,k){
  var st=document.getElementById('st-'+k),sl=document.getElementById('sl-'+k);
  st.className='st ld';st.textContent='⏳ '+file.name+' 읽는 중...';
  var rd=new FileReader();
  rd.onload=function(e){
    try{var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});F[k]=wb;sl.classList.add('done');
    st.className='st ok';st.textContent='✓ '+file.name;chk();}
    catch(er){st.className='st err';st.textContent='✗ '+er.message}};
  rd.onerror=function(){st.className='st err';st.textContent='✗ 파일 읽기 오류'};
  rd.readAsArrayBuffer(file);
}
function chk(){var n=0;for(var k in F)if(F[k])n++;var b=document.getElementById('btnGo');b.textContent='🔄 자동 가공 시작 ('+n+'/5)';b.disabled=n<5}
function resetAll(){for(var k in F)F[k]=null;document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('done')});
  SLOTS.forEach(function(s){var st=document.getElementById('st-'+s.k);st.className='st';st.textContent='클릭 또는 드래그'});
  document.getElementById('btnGo').disabled=true;document.getElementById('btnGo').textContent='🔄 자동 가공 시작';}

// ===== 핵심: 자동 가공 =====
function process(){
  var items=[];R={items:[],tots:{},bc:0,ba:0,bl:0,hp:0,hm:0,hc:0};

  // 1. 제비용 분개장
  try{
    var ws=F.je.Sheets[F.je.SheetNames[0]],d=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    var h={};d[0].forEach(function(v,i){h[String(v).trim()]=i});
    var seqCol=h['관리번호']!=null?h['관리번호']:(h['번호']!=null?h['번호']:(h['No']!=null?h['No']:h['NO']));
    var dateCol=h['전표일자']!=null?h['전표일자']:h['전표 일자'];
    var deptCol=h['발행부서명']!=null?h['발행부서명']:h['부서명'];
    var writerCol=h['작성자명']!=null?h['작성자명']:h['작성자'];
    for(var r=1;r<d.length;r++){
      var rw=d[r],cc=String(rw[h['코스트센터명']]||''),mm=String(rw[h['적요']]||''),ac=String(rw[h['계정코드']]||''),an=String(rw[h['계정명']]||''),am=Number(rw[h['금액']]||0);
      if(cc!=='품질관리팀(평택)')continue;
      if(mm.indexOf('정수기')>=0&&mm.indexOf('렌탈')>=0)continue;
      if(mm.indexOf('감가상각')>=0)continue;
      var g,it;
      if(ac==='8305200'){g='실패';it='자재 폐기 비용'}
      else if(ac==='8302800'||(mm.indexOf('운송')>=0&&mm.indexOf('배차')>=0)){g='실패';it='AS 제반 경비'}
      else if(ac==='8302100'||ac==='8304500'||an.indexOf('비품')>=0){g='예방';it='시스템 구축 및 인증 유지 비용'}
      else if(mm.indexOf('렌탈')>=0&&mm.indexOf('전산장비')>=0){g='예방';it='시스템 구축 및 인증 유지 비용'}
      else if(ac==='8302900'){g='평가';it='외부 시험 의뢰비'}
      else if(mm.indexOf('조화')>=0||mm.indexOf('경조')>=0||mm.indexOf('바른사원')>=0||mm.indexOf('조의금')>=0){g='예방';it='행사비'}
      else{g='예방';it='품질 TFT/분임조 활동 비용'}
      items.push({seq:seqCol!=null?String(rw[seqCol]||''):'',date:dateCol!=null?String(rw[dateCol]||''):'',
        dept:deptCol!=null?String(rw[deptCol]||''):'',writer:writerCol!=null?String(rw[writerCol]||''):'',
        acctName:an,gubun:g,item:it,memo:mm,amount:am,src:'제비용분개장'});
    }
  }catch(e){alert('제비용 분개장 오류: '+e.message)}

  // 2. AS컨택센터 — ② 시디즈 영역: 상담(유선)_AS + 상담(모바일) + 접수(AS) 청구금액 합산
  // 구조: C4(idx3)="② 시디즈" → R175: C4="청구금액" + C5="상담(유선)_AS" 같은 행!
  // 월 컬럼: C10(idx9)=2월 → 공식 7+mi
  try{
    var ws2=F.brand.Sheets['브랜드 청구내역'];
    if(!ws2){for(var sn2 in F.brand.Sheets){if(sn2.indexOf('청구')>=0&&sn2.indexOf('내역')>=0){ws2=F.brand.Sheets[sn2];break;}}}
    if(!ws2) ws2=F.brand.Sheets[F.brand.SheetNames[0]];
    var d2=XLSX.utils.sheet_to_json(ws2,{header:1,defval:'',blankrows:true});
    var ym=document.getElementById('ymIn').value,mi=parseInt(ym.split('-')[1]);
    var monthCol=7+mi; // 1월=idx8, 2월=idx9...
    var inSidiz2=false,inAmt=false,contact=0,contactParts=[];
    for(var r2=0;r2<d2.length;r2++){
      var row2=d2[r2]||[];
      var c3=String(row2[3]||''); // C4(idx3)
      var c4=String(row2[4]||''); // C5(idx4) = 업무명
      // ② 시디즈 시작
      if(c3.indexOf('② 시디즈')>=0){inSidiz2=true;continue;}
      // ③ 알로소 도달 시 중단
      if(inSidiz2&&c3.indexOf('③')>=0)break;
      if(!inSidiz2)continue;
      // 청구금액 영역 진입 (이 행 자체도 데이터 포함!)
      if(c3.indexOf('청구금액')>=0) inAmt=true;
      if(!inAmt)continue;
      // 상담(유선)_AS만 (온라인 제외)
      if(c4.indexOf('상담')>=0&&c4.indexOf('유선')>=0&&c4.indexOf('_AS')>=0&&c4.indexOf('온라인')<0){
        var v=Number(row2[monthCol]||0);if(isNaN(v))v=0;
        contact+=v;contactParts.push('상담AS '+v.toLocaleString());
      }
      else if(c4.indexOf('상담')>=0&&c4.indexOf('모바일')>=0){
        var v=Number(row2[monthCol]||0);if(isNaN(v))v=0;
        contact+=v;contactParts.push('모바일 '+v.toLocaleString());
      }
      else if(c4.indexOf('접수')>=0&&c4.indexOf('AS')>=0){
        var v=Number(row2[monthCol]||0);if(isNaN(v))v=0;
        contact+=v;contactParts.push('접수AS '+v.toLocaleString());
      }
    }
    R.bc=contact;
    items.push({seq:'',date:'',dept:'',writer:'',acctName:'AS 고객센터 상담 인건비',
      gubun:'실패',item:'AS 용역료(바로스)_컨텍센터',memo:'AS 고객센터 상담 인건비',amount:R.bc,src:'브랜드용역료'});
  }catch(e){alert('브랜드 용역료 오류: '+e.message)}

  // 3. AS조치비(무상) — (전표) 시트 → 2. 시디즈 → 합계
  try{
    var ws3=F.as.Sheets['(전표) 브랜드 용역료 청구'];
    if(!ws3){for(var sn3 in F.as.Sheets){if(sn3.indexOf('전표')>=0){ws3=F.as.Sheets[sn3];break;}}}
    var d3=XLSX.utils.sheet_to_json(ws3,{header:1,defval:'',blankrows:true});
    var inSidiz3=false; R.ba=0;
    for(var r3=0;r3<d3.length;r3++){
      var row3=d3[r3]||[],rs3=row3.map(function(v){return String(v)}).join('');
      if(rs3.indexOf('2. 시디즈')>=0||rs3.indexOf('2.시디즈')>=0){inSidiz3=true;continue;}
      if(inSidiz3&&(rs3.indexOf('3.')>=0&&(rs3.indexOf('알로소')>=0||rs3.indexOf('3. ')>=0))){break;}
      if(inSidiz3){
        var hasHapgye=false;
        for(var ci=0;ci<Math.min(row3.length,10);ci++){if(String(row3[ci]||'').trim()==='합계'){hasHapgye=true;break;}}
        if(hasHapgye){
          for(var ci=4;ci<Math.min(row3.length,20);ci++){var v=Number(row3[ci]||0);if(v>=1000000){R.ba=v;break;}}
          if(R.ba>0)break;
        }
      }
    }
    items.push({seq:'',date:'',dept:'',writer:'',acctName:'AS 조치비(무상)',
      gubun:'실패',item:'AS 용역료(바로스)_조치비(무상)',memo:'AS 조치비(무상)',amount:R.ba,src:'AS조치용역료'});
  }catch(e){alert('AS조치 용역료 오류: '+e.message)}

  // 4. AS물류비 — 시디즈 용역료 청구서
  // 주의: C7(idx6)이 수식(=F20*3580)이므로 sheet_to_json은 문자열 반환 → 셀 직접 접근 필요
  try{
    var ws4=F.logi.Sheets[F.logi.SheetNames[0]];
    R.bl=0;
    // 헬퍼: 워크시트에서 셀의 계산된 값을 직접 읽기
    function getCellNum(ws,r,c){
      var addr=XLSX.utils.encode_cell({r:r,c:c});
      var cell=ws[addr];
      if(!cell)return 0;
      if(typeof cell.v==='number')return cell.v;
      var n=Number(cell.v);
      return isNaN(n)?0:n;
    }
    // 시트 범위 확인
    var range=XLSX.utils.decode_range(ws4['!ref']||'A1:J30');
    // "AS조치" 행 찾기

      var c1Addr=XLSX.utils.encode_cell({r:r4,c:1}); // C2=col B=idx1
      var c1Cell=ws4[c1Addr];

        R.bl=getCellNum(ws4,r4,6);
        if(R.bl===0){
          // fallback: idx5~idx8에서 큰 값 탐색
          for(var ci=5;ci<=8;ci++){
            var nv=getCellNum(ws4,r4,ci);
            if(nv>=100000){R.bl=nv;break;}
          }
        }

  }catch(e){alert('시디즈 용역료 오류: '+e.message)}

    var h5={};d5[0].forEach(function(v,i){h5[String(v).trim()]=i});
    var seqCol5=h5['관리번호']!=null?h5['관리번호']:(h5['번호']!=null?h5['번호']:(h5['No']!=null?h5['No']:h5['NO']));

      else if(mm5.indexOf('클레임 보상')>=0||mm5.indexOf('클레임 상품권')>=0||mm5.indexOf('반품재작업')>=0)it5='(판)하자보수비_클레임 보상';
      else it5='(판)하자보수비_제품';
      items.push({seq:seqCol5!=null?String(rw5[seqCol5]||''):'',date:dateCol5!=null?String(rw5[dateCol5]||''):'',
        dept:deptCol5!=null?String(rw5[deptCol5]||''):'',writer:writerCol5!=null?String(rw5[writerCol5]||''):'',

    }
  }catch(e){alert('하자보수비 오류: '+e.message)}

  // 집계 (NaN 방지)
  var tots={};items.forEach(function(i){

function sty(fill,bold,fontClr,hAlign,numFmt,allBorder){
  var s={};
  if(fill) s.fill={fgColor:{rgb:fill}};
  if(bold||fontClr) s.font={};
  if(bold) s.font.bold=true;
  if(fontClr) s.font.color={rgb:fontClr};
  if(hAlign) s.alignment={horizontal:hAlign,vertical:'center',wrapText:true};
  if(numFmt) s.numFmt=numFmt;
  if(allBorder){var bd={style:'thin',color:{rgb:'000000'}};s.border={top:bd,bottom:bd,left:bd,right:bd};}
  return s;
}
